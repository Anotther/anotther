    <rect x="630" y="80" width="170" height="100" rx="6" fill="#0d1117" stroke="#21262d"/>
    <text x="715" y="105" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">NPS</text>
    <text x="715" y="140" text-anchor="middle" font-family="monospace" font-size="20" font-weight="bold" fill="#d29922">87</text>
